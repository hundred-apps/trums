name: Deploy Nuxt 3

on:
  push:
    branches: ["konsinyasi"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # ==== CEK SECRETS TERSEDIA ====
      - name: Cek SSH Secrets
        run: |
          echo "Cek secrets SSH..."
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "❌ SSH_HOST tidak tersedia!"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then
            echo "❌ SSH_USER tidak tersedia!"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then
            echo "❌ SSH_PORT tidak tersedia!"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "❌ SSH_KEY tidak tersedia!"
            exit 1
          fi
          if [ -z "${{ secrets.APP_DIR }}" ]; then
            echo "❌ APP_DIR tidak tersedia!"
            exit 1
          fi
          echo "✅ Semua secrets tersedia."

      # ==== SETUP SSH AGENT ====
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.5.2
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
          
      # ==== TEST SSH TERLEBIH DAHULU ====
      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo 'SSH BERHASIL TERHUBUNG KE SERVER!' && whoami && hostname"

